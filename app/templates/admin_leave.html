<!DOCTYPE html><html><head><title>Leave Requests</title><meta name="viewport" content="width=device-width, initial-scale=1"><link href="/static/styles.css" rel="stylesheet"></head><body><div class="container"><div class="topbar"><div><div class="brand">Leave Requests</div><div class="muted-text">Welcome, {{user.name}}</div></div><div class="actions"><a class="btn secondary" href="/admin">Back to Admin</a><a class="btn secondary" href="/logout">Logout</a></div></div><div class="card"><div class="section-title">Leave Requests</div>{% for leave in leave_requests %}<div class="list-row"><b>{{leave.employee.name}}</b><br>{{leave.start_date.strftime('%d %b %Y')}} to {{leave.end_date.strftime('%d %b %Y')}}<br>{{leave.reason}}<br><span class="badge {{leave.status}}">{{leave.status}}</span><form method="post" action="/admin/leave/{{leave.id}}/status"><select name="status"><option value="pending" {% if leave.status == 'pending' %}selected{% endif %}>pending</option><option value="approved" {% if leave.status == 'approved' %}selected{% endif %}>approved</option><option value="rejected" {% if leave.status == 'rejected' %}selected{% endif %}>rejected</option></select><button>Update</button></form></div>{% else %}<div class="muted-text">No leave requests</div>{% endfor %}</div></div></body></html>
