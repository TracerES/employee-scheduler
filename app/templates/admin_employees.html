<!DOCTYPE html><html><head><title>Add Employee</title><meta name="viewport" content="width=device-width, initial-scale=1"><link href="/static/styles.css" rel="stylesheet"></head><body><div class="container"><div class="topbar"><div><div class="brand">Add Employee</div><div class="muted-text">Welcome, {{user.name}}</div></div><div class="actions"><a class="btn secondary" href="/admin">Back to Admin</a><a class="btn secondary" href="/logout">Logout</a></div></div><div class="grid"><div class="card"><div class="section-title">New Employee</div><form method="post" action="/admin/employees/add"><label>Name</label><input name="name" required><label>Email</label><input name="email" type="email" required><label>Password</label><input name="password" required><button>Create Employee</button></form></div><div class="card"><div class="section-title">Employees</div>{% for emp in employees %}<div class="list-row"><b>{{emp.name}}</b><br>{{emp.email}}</div>{% else %}<div class="muted-text">No employees yet</div>{% endfor %}</div></div></div></body></html>
