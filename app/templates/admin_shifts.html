<!DOCTYPE html><html><head><title>Create Shift</title><meta name="viewport" content="width=device-width, initial-scale=1"><link href="/static/styles.css" rel="stylesheet"></head><body><div class="container"><div class="topbar"><div><div class="brand">Create Shift</div><div class="muted-text">Welcome, {{user.name}}</div></div><div class="actions"><a class="btn secondary" href="/admin">Back to Admin</a><a class="btn secondary" href="/logout">Logout</a></div></div><div class="card narrow"><div class="section-title">Create Shift</div><form method="post" action="/admin/shifts/add"><label>Employee</label><select name="employee_id">{% for emp in employees %}<option value="{{emp.id}}">{{emp.name}}</option>{% endfor %}</select><label>Date</label><input type="date" name="shift_date" required><label>Start</label><input type="time" name="start_time" required><label>End</label><input type="time" name="end_time" required><label>Note</label><input name="note"><label>Repeat weekly for weeks</label><input type="number" name="repeat_weeks" min="1" max="52" value="1"><button>Add Shift</button></form></div></div></body></html>
